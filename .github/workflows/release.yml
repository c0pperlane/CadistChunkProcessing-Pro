name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 9.2.0) — a tag v<version> will be created"
        required: true
        type: string
      changelog:
        description: "Markdown changelog for the release body (optional)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve version & tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            # Create and push the tag so the release is anchored to a real tag
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -f "$TAG" -m "Release $TAG"
            git push -f origin "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"           # e.g. v9.1.0
            VERSION="${TAG#v}"                 # strip leading v
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Build jar
        run: mvn -B clean package

      - name: Locate jar
        id: jar
        run: |
          JAR=$(ls target/CadistChunkProcessing-Pro-*.jar | grep -v original | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "CadistChunkProcessing Pro ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          files: ${{ steps.jar.outputs.path }}
          body: |
            ## CadistChunkProcessing Pro ${{ steps.meta.outputs.tag }}

            ${{ inputs.changelog }}

            ---
            **Paper 1.21.11 · PacketEvents 2.12.1 · Java 21**

            Drop `${{ steps.jar.outputs.name }}` into your `plugins/` folder.
            PacketEvents must be installed separately.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full feature docs.
