name: CadistChunkProcessingPro
version: '${project.version}'
main: net.cadistenmc.cadistchunkprocessing.CadistChunkProcessingPro
api-version: '1.21'
folia-supported: true
depend: [packetevents]
author: cadistenmc
description: Fog-of-war chunk culling — anti-freecam (hide what players haven't seen) + anti-xray ore/base hiding + bandwidth saving. Solidify, never void.

commands:
  cadistchunk:
    description: CadistChunkProcessing Pro admin commands
    usage: /cadistchunk <gui|fog|stats|bar|mode|reload>
    permission: cadistchunkprocessing.admin
    aliases: [cadist, ccp]

permissions:
  cadistchunkprocessing.admin:
    description: Access to the admin GUI and commands.
    default: op
  cadistchunkprocessing.bypass:
    description: Player receives raw, unprocessed chunks (no hiding).
    default: false
