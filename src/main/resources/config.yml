# ============================================================================
#  CadistChunkProcessing Pro
# ----------------------------------------------------------------------------
#  Model: "solidify, never void". Hidden caves and buried ores are replaced
#  with a homogeneous ghost solid (stone/deepslate/netherrack/end_stone) — we
#  NEVER write air where a solid was, so the client can never see void on
#  mining, chunk borders, or in freecam. Bandwidth is saved by collapsing each
#  chunk section's palette (one block-state per section ≈ a few bytes on the
#  wire), which matches or beats the old "void" approach byte-for-byte.
# ============================================================================

# Active mode. One of: BALANCED | MAX_SAVINGS | GENEROUS
#   BALANCED     — big savings, caves open smoothly well before you arrive.
#   MAX_SAVINGS  — highest savings (home-server upload), caves open closer in.
#   GENEROUS     — smoothest visuals, lower savings (builder-friendly).
mode: BALANCED

# Master toggles (also switchable live in the GUI / via commands).
cave-hiding: true   # hide caves below the surface
ore-hiding: true    # anti-xray: camouflage ores you cannot legitimately see

# Anti-Base Finder (aggressive base hiding). A normal cave mouth reveals inward
# so it never false-culls — but a player-dug entrance tunnel, ladder/water-lift
# shaft or hollowed room is ALSO a "cave mouth", so without this it would reveal
# too and betray a base. With this on, in the hidden tiers (SHELL/DEEP):
#   * any connected pocket of cave space that touches a man-made block (the whole
#     tunnel/shaft/room, not just the bit next to it) is treated as a base and
#     stays solid even if it reaches an opening — the entrance never "opens"; and
#   * the base's own blocks below ground (ladders, rails, redstone, lamps, doors,
#     signs, building blocks, mineral-storage blocks…) are recoloured to plain
#     rock, so nothing leaks through a thin wall or a window.
# Strictly sub-surface and solidify-only (no void): surfaces stay vanilla and the
# REAL bubble is untouched, so YOUR base re-appears in full as you walk up to it.
# Aggressive by design — a connected natural cave that a base tunnels into will
# also be hidden while far away. ON by default: fog of war hides unexplored cave
# space, but a base's solid man-made BLOCKS (walls/floor) are not cave air, so
# anti-base is what scrubs them to rock — the two together fully hide bases.
anti-base-finder: true

# Anti-xray ore visibility:
#   false (default) = show only ores you could legitimately see — surface-exposed
#                     veins (any distance) PLUS ores in the cave you're actually
#                     standing in (within ore-reveal-radius). Buried ore, distant
#                     caves, and dig-down-and-peek-through-walls stay hidden.
#   true            = paranoid: hide EVERY ore everywhere; you only get ore by
#                     mining the disguised stone. Strongest anti-xray.
hide-all-ores: false

# Anti-xray for block entities (chests, spawners, trial spawners, furnaces,
# barrels, brewing stands, beacons, end portals…). A chunk packet carries a
# block-entity LIST separate from the block array, so even with ores/caves
# camouflaged a cheat client can read it to locate every buried chest and
# spawner. When true, block entities below the surface are stripped from
# hidden (SHELL/DEEP) chunks — they return automatically as you approach and
# the chunk becomes REAL. Surface structures (village chests, etc.) are kept.
hide-block-entities: true

# Blocks around the player within which exposed ores stay visible (= "the cave
# you're in"). Only used when hide-all-ores is false AND reachability-ores is off.
ore-reveal-radius: 16

# Reachability ore reveal (smarter than the radius above). Instead of a sphere
# that can leak ore through a wall, this reveals an ore only if it touches air the
# player can ACTUALLY reach — the connected cave/tunnel they're standing in. A
# vein a few blocks away behind solid rock stays hidden; the cave you're in stays
# fully lit; and it can't be peeked through walls or with freecam (it's computed
# from your real body position, and unreachable space is never sent).
#   How: a small, bounded flood-fill around each player runs on the main thread a
#   few times a second (only when you move into new space), and the result is used
#   when classifying ore in your real bubble. While it's warming up (just joined /
#   moving fast) it falls back to ore-reveal-radius, so you never get a blank gap.
#   Cost: scanning is bounded (real-radius chunks, a vertical band around you) and
#   throttled; if you're worried about TPS on a big server, watch /tps after
#   enabling. Off by default.
reachability-ores: false

# Reachability CAVE hiding (builds on the same scanner as reachability-ores).
# Normally the real bubble around you is sent fully real, so freecam/x-ray can
# see every cave near you. With this on, in that bubble every cave-air cell you
# can NOT reach is solidified — only the cave you're actually standing in stays
# real. Result: a cave/base you aren't inside reads as solid rock even up close,
# and freecam can't see it (it's never sent). If anti-base-finder is also on, the
# enclosed man-made blocks of a base you can't reach are scrubbed too, so its
# walls don't outline it on x-ray.
#   Digging stays correct in the cave you're in; mining a wall into a hidden
#   pocket reveals it within a moment (a re-scan, then a re-send) - never void,
#   just a brief catch-up. A sealed base (behind a closed door/trapdoor/wall) is
#   fully hidden; a cave that's genuinely open and walk-into-able from where a
#   viewer stands is real terrain and can't be hidden.
#   Recommended together with cave-hiding + anti-base-finder. Off by default.
reachability-caves: false

# Sealed-cave hiding (the gentle sibling of reachability-caves). Instead of hiding
# every cave you can't reach, this hides ONLY caves with no entrance to the open
# sky - fully walled-off pockets and sealed rooms - even in the close-up real
# bubble. Caves that genuinely reach the surface (real, visible cave mouths) are
# left intact, so nothing visible is ever false-culled; and the cave/room you are
# actually standing in is kept (so a sealed base with a closed door never
# solidifies around you). The result: the swiss-cheese of enclosed cavities that
# freecam/x-ray loves to reveal around you reads as solid rock, without the
# aggressiveness (or surprise pop-in) of full reachability hiding.
#   It shares the same bounded main-thread scanner as the other reachability
#   features (needed so the room you're in is protected), and is seam-continuous
#   across chunks. Pure solidify - never creates void; mining into a sealed pocket
#   reveals it within a moment. A good companion to vertical-culling: it removes the
#   sealed caves the vertical margin would otherwise leave floating. Off by default.
hide-sealed-caves: false

# Reveal-distance leash (modifier on the reachability scanner). By default
# reachability reveals the WHOLE connected cave/tunnel system you can reach - so
# standing in or at the mouth of a big system, a viewer can see all of it. This
# caps how far the revealed area extends: only air within this many blocks (3D,
# straight-line) of you stays revealed; connected space beyond it is hidden and
# re-reveals as you move closer. So freecam sees only a bubble around you, not the
# whole system, while the cave you're actually in/near stays correct.
#   0       = unlimited (reveal the entire connected system; original behavior)
#   e.g. 32 = only reveal connected air within 32 blocks of you
# Only does anything while a reachability feature is on (reachability-ores /
# -caves or hide-sealed-caves - they run the scanner this shapes). It also bounds
# how far down a shaft you can see (vertical culling keeps reachable air): keep it
# >= how deep a ravine you want to see into. Off (0) by default.
reveal-distance: 0

# Surface-entrance camouflage. A buried base is hidden, but its DOOR at the
# surface (a trapdoor, ladder shaft, hatch or water-lift dropping into the ground)
# is a dead giveaway from a distance. With this on, in the hidden tiers a column
# that is a NARROW PIT (every neighbouring column's ground is higher — i.e. a 1-2
# wide shaft, not a slope or a wide-open cavern) and that contains a man-made
# block or fluid is capped up to the surrounding rim using the neighbour's own
# surface blocks, so from afar the ground looks untouched. It reappears in the
# REAL bubble so you can still use your own entrance.
#   This is the one deliberate exception to "never touch the surface", kept narrow
#   and artificial/fluid-gated so natural ravines and cave mouths are left alone.
#   Pure solidify (only writes solid over transparent) so it never creates void.
#   Note: a base left WIDE OPEN to the sky (a big sinkhole/open cavern) is surface
#   terrain and can't be hidden this way - seal the entrance. Off by default.
surface-entrances: false

# Fog of war (REAL tier). The strongest anti-xray/anti-freecam policy: only the
# cells you have actually SEEN (eye raycasts) or been near (an 8-block body
# bubble) are ever sent real - everything else below the surface reads as solid
# rock, even open caves you could walk into but never looked at. A freecam/x-ray
# client therefore learns nothing you haven't already legitimately seen.
#   - Visible cave mouths in your bubble still read as mouths (an entrance shell),
#     and the bubble around you is always real, so nothing visible is false-culled.
#   - Reveals are monotone within a session (no flicker); looking at something
#     reveals it before you reach it; mining into a fogged pocket reveals it within
#     a moment (re-scan + re-send - never void).
#   - Subsumes reachability-caves when both are on (fog is the stricter keep).
#   - Runs a bounded, throttled main-thread eye-raycast scan per moving/looking
#     player - watch /tps on a very large server.
# ON by default (the headline anti-freecam cull) - set false to fall back to the
# lighter distance-only hiding. Exploration persists to disk per player per world
# (see fog-persist) so it survives restarts. A settings change resets the live
# set; it rebuilds within a second of moving/looking and reloads from disk on join.
fog-of-war: true
# Reveal what you LOOK at, via eye raycasts (the strongest anti-freecam). Set false
# to reveal ONLY what you walk near (the live radius below) - cheaper and purely
# movement-driven (no look-vector cost), but a viewer can see the bubble around a
# player even where they haven't faced. true = max anti-freecam, false = lighter.
fog-sight-rays: true
# How far (blocks) sight rays reveal. Higher sees/reveals farther at more cost.
fog-ray-distance: 64
# Reveal newly-seen cells with per-BLOCK updates (only the blocks that change) rather
# than re-sending whole chunks. This is what keeps FPS up while exploring; leave on.
# (A very large first reveal of a whole cavern still uses one chunk re-send.)
fog-block-updates: true
# The "live radius": the bubble around you that is ALWAYS real, even cells you
# haven't actually looked at (digging safety + never being buried in fog). 2-64.
# COST WARNING: this floods all connected air inside the bubble, so the work grows
# with its VOLUME (~radius^3) — every +1 is a lot more, doubling it is ~8x. Keep it
# small (8-16). To see FARTHER, raise fog-ray-distance instead (that scales linearly,
# far cheaper). The flood only runs when you actually move, not when you look around.
fog-body-radius: 8
# Sight rays cast per player per scan (a global per-tick governor caps the total).
fog-rays-per-scan: 96
# Per-player cap on remembered explored chunks (farthest are evicted past this).
fog-max-chunks: 50000
# Save/load explored sets to plugins/<this>/explored/<world>/<player>.ccpf so
# exploration survives restarts. Files are safe to delete at any time (players
# re-explore; hiding only ever increases). true to persist, false for in-memory.
fog-persist: true
# Forget exploration older than this many days at load (0 = remember forever).
fog-expire-days: 0

# Extra blocks to treat as ore (anti-xray), matched by name substring against
# the block id. Useful for modded/datapack ores. Examples below (commented):
extra-ores: []
#  - "ruby_ore"
#  - "platinum_ore"

# Performance: cache the processed result of far (DEEP) chunks and reuse it for
# every player / re-send instead of re-running the engine each time. DEEP chunks
# are fully solid rock far below the surface, so a cached entry is never visible
# until the chunk re-sends as a near tier (which bypasses the cache) — i.e. it
# can never show stale geometry to anyone who could reach it.
#   true  = efficient (recommended for production)
#   false = "live": reprocess every chunk on every send (watch processing happen;
#           useful for testing/verifying behavior). Also live-toggle in the GUI.
chunk-cache: true

# Also flatten the per-section BIOME palette in fully-hidden (single-block)
# sections to that section's own existing biome. Invisible (the section is solid
# and unseen) and lets network compression crush the biome bytes too. Reuses an
# existing biome id, so it can never produce an invalid biome.
collapse-biomes: true

# Vertical culling. The REAL bubble around you is normally sent as full columns
# (surface to bedrock) so digging is always correct — but that means the deep
# caves far BELOW you (e.g. while you stand on the surface) are sent in full for
# no reason. With this on, in the REAL bubble everything more than
# `vertical-margin` blocks below you is solidified, and re-revealed as you
# descend (every `vertical-resend-blocks` of downward movement re-sends the
# bubble). The margin + resend stay ahead of normal digging/falling speed, so
# you never reach un-revealed solid; worst case under extreme fast descent is a
# brief re-send catch-up, never void.
#   The cut is applied PER COLUMN, clamped to each column's own surface: it is
#   never raised above a column's surface, so when you stand higher than nearby
#   terrain the open air over that terrain is left alone (no flat floating "cliff"
#   slab) and lower terrain simply has its deep caves hidden. Columns with no
#   terrain (open air / ocean) are skipped entirely.
#   If a reachability feature is on (the scanner is running), vertical culling
#   also NEVER solidifies air you can reach: the connected cave/ravine you're
#   standing in stays open all the way down to its floor (look from the top of a
#   shaft straight to the bottom), no matter how small the margin is, while the
#   rock around it still collapses. So a small margin (e.g. 8) is safe to use.
#   true  = big extra savings in the REAL tier (recommended)
#   false = send full columns (old behavior)
vertical-culling: true

# Blocks kept real below your feet before vertical culling kicks in. Larger =
# safer for fast descents, smaller = more savings/aggression. (min 8) With fog of
# war on, what you've explored stays open regardless, so 8 is the aggressive default.
vertical-margin: 8

# Re-send the bubble after this many blocks of vertical movement, so the cull
# line follows you down/up. Smaller = more responsive (more re-sends). (min 4)
vertical-resend-blocks: 16

# Worlds where processing is active. ["*"] = all worlds.
enabled-worlds:
  - "*"

# How many queued chunk re-sends are flushed per tick, per player, when a
# player crosses a chunk boundary (the "reveal" mechanism). Higher = caves
# catch up faster when moving quickly; lower = gentler on the network.
refresh-per-tick: 6

# Seconds after joining during which ALL chunks are sent raw (bypasses the
# join chunk-flood). 0 = process immediately on join.
join-raw-seconds: 0

# ----------------------------------------------------------------------------
# Per-mode parameters. All are live-tunable in the GUI.
#   real-radius          chunks around the player sent fully real (so digging
#                        is always correct). Must be >= 2.
#   cave-render-distance chunks within which cave openings still reveal inward
#                        (entrance-shell-depth). Beyond it, everything below
#                        the surface is solidified for maximum savings.
#   entrance-shell-depth blocks of cave revealed inward from a real opening,
#                        so visible cave mouths / holes are never false-culled.
#   homogenize-below     real margin (blocks) kept under each column's surface
#                        before the DEEP tier collapses everything beneath it to
#                        the ghost block. Smaller = more savings, more uniform
#                        distant cliff faces. (Per-column, so ravines/cave mouths
#                        never block a chunk's collapse.)
#   rock-collapse        DEEP tier merges all sub-surface rock (granite/tuff/…)
#                        into the ghost block, giving single-palette sections.
#   reveal-hysteresis    chunks; a revealed chunk is only re-hidden once it is
#                        this far beyond real-radius (prevents resend thrash).
# ----------------------------------------------------------------------------
modes:
  BALANCED:
    real-radius: 4
    cave-render-distance: 10
    entrance-shell-depth: 6
    homogenize-below: 8
    rock-collapse: true
    reveal-hysteresis: 2
  MAX_SAVINGS:
    real-radius: 2
    cave-render-distance: 2   # = real-radius -> no shell ring; everything past the bubble is fully collapsed
    entrance-shell-depth: 0
    homogenize-below: 2
    rock-collapse: true
    reveal-hysteresis: 2
  GENEROUS:
    real-radius: 6
    cave-render-distance: 14
    entrance-shell-depth: 10
    homogenize-below: 24
    rock-collapse: false
    reveal-hysteresis: 2

# Verbose logging + per-chunk diagnostics. Leave off in production.
debug: false

# Send anonymous usage metrics via bStats (server count, MC/Java version, and
# which features are enabled). No player data, no chunk data. Set false to opt out.
metrics: true
